<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>NL clicker — Официальный сайт</title>
    <style>
        :root {
            --bg: #0a0a0b;
            --text-main: #ffffff;
            --text-dim: #666;
            --accent: #ffffff;
        }

        body {
            background-color: var(--bg);
            color: var(--text-main);
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            margin: 0;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            text-align: center;
        }

        .container {
            padding: 20px;
            max-width: 600px;
        }

        .logo {
            font-size: 2.5rem;
            font-weight: 800;
            letter-spacing: -1px;
            margin-bottom: 10px;
            text-transform: uppercase;
        }

        .description {
            font-size: 1.1rem;
            color: var(--text-dim);
            line-height: 1.6;
            margin-bottom: 40px;
        }

        .btn {
            display: inline-block;
            padding: 12px 30px;
            border: 1px solid var(--accent);
            color: var(--accent);
            text-decoration: none;
            font-weight: 500;
            font-size: 0.9rem;
            transition: all 0.3s ease;
            border-radius: 4px;
        }

        .btn:hover {
            background: var(--accent);
            color: var(--bg);
        }

        footer {
            position: absolute;
            bottom: 30px;
            width: 100%;
            font-size: 11px;
            color: #333;
            letter-spacing: 1px;
            text-transform: uppercase;
        }
    </style>
</head>
<body>

    <div class="container">
        <div class="logo">NL clicker</div>
        <p class="description">
            Официальный ресурс программного обеспечения. <br>
            В данный момент мы обновляем сайт для предоставления полной информации о софте.
        </p>
        
        <!-- Ссылка на ту самую страницу "в разработке", которую мы сделали раньше -->
        <a href="https://noizeloser.github.io/NL-clicker.com/maintenance" class="btn">Узнать больше</a>
    </div>

    <footer>
        © 2024 Все права защищены. Копирование запрещено.
    </footer>

</body>
</html>
